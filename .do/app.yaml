name: agora-custom-llm
region: nyc

services:
  - name: web
    github:
      repo: Bac1314/Agora_CustomLLM_Dify
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 10
    envs:
      - key: OPENAI_BASE_URL
        value: "https://api.openai.com/v1"
        scope: RUN_AND_BUILD_TIME
      - key: OPENAI_API_KEY
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
        scope: RUN_AND_BUILD_TIME
      - key: WRAPPER_API_KEY
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: DIFY_WEATHER_API_KEY
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: DIFY_WEB_SEARCH_API_KEY
        type: SECRET
        scope: RUN_AND_BUILD_TIME
      - key: LOG_LEVEL
        value: "INFO"
        scope: RUN_AND_BUILD_TIME
      - key: TOOLS_CONFIG
        value: "config/tools.yaml"
        scope: RUN_AND_BUILD_TIME
