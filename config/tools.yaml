  - name: web_search
    description: >
      Search the web for current information on a topic and return a concise
      summary. Use this when the user asks about recent news, real-time facts,
      or anything that may be outside the LLM's training data (e.g., "what's
      the latest on X?", "look up Y for me", "search for Z"). Results are
      delivered to the user shortly after you acknowledge the request.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "The search query — the topic or question to look up on the web. Be specific and concise."
        location:
          type: string
          description: "Optional. The user's location to localise search results, e.g. 'San Francisco, US'. Omit if the query is not location-sensitive."
      required:
        - query
    dify:
      endpoint: workflow
      base_url: https://api.dify.ai/v1
      api_key_env: DIFY_WEB_SEARCH_API_KEY
      input_mapping:
        query: query
        location: location
      user_field: "{user_id}"
    synthetic_ack: "Sure — let me search the web for that. I'll share what I find in just a moment."
    rtm_prefix: "[Web Search] "
    mode: async

  - name: get_current_weather
    description: >
      Get the current weather for a location. Use when the user asks about
      weather conditions, temperature, or forecast. The answer will be spoken
      aloud immediately.
    parameters:
      type: object
      properties:
        location:
          type: string
          description: "City and country, e.g. 'San Francisco, US'"
      required:
        - location
    dify:
      endpoint: workflow
      base_url: https://api.dify.ai/v1
      api_key_env: DIFY_WEATHER_API_KEY
      input_mapping:
        location: location
      user_field: "{user_id}"
    synthetic_ack: ""
    rtm_prefix: ""
    mode: sync

