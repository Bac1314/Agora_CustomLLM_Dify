# Dify Tool Registry
#
# Each entry defines one tool exposed to the upstream LLM via OpenAI function calling.
# When the LLM decides to call the tool, the wrapper fires the Dify workflow
# asynchronously, returns `synthetic_ack` immediately so the LLM can speak,
# then delivers the real result via RTM + session memory when Dify finishes.
#
# Fields:
#   name          - OpenAI function name (snake_case, no spaces)
#   description   - Shown to the LLM to help it decide when to call this tool
#   parameters    - Valid JSON Schema forwarded verbatim to OpenAI tools[]
#   dify:
#     endpoint    - "workflow" (/workflows/run) or "chat" (/chat-messages)
#     base_url    - Dify server base URL (e.g. https://api.dify.ai/v1)
#     api_key_env - Name of the environment variable holding the Dify app API key
#     input_mapping - LLM function arg name -> Dify workflow input name
#     user_field  - Template for the Dify `user` param; supports {user_id}, {channel_name}
#   synthetic_ack - Text returned as the tool result immediately (what the LLM speaks while waiting)
#   rtm_prefix    - Prepended to the Dify result in the out-of-band RTM message
#   mode          - "async" (default): fire-and-forget, result delivered via RTM + session memory
#                   "sync": await Dify result before the 2nd LLM call; LLM speaks the real answer

