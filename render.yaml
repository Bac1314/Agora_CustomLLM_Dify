services:
  - type: web
    name: agora-custom-llm
    runtime: docker
    healthCheckPath: /health
    envVars:
      # Upstream LLM
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false          # set in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Agora
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: AGORA_RTM_SENDER_UID
        value: custom-llm-wrapper
      - key: AGORA_CUSTOMER_ID
        sync: false
      - key: AGORA_CUSTOMER_SECRET
        sync: false
      # Dify tool keys
      - key: DIFY_WEATHER_API_KEY
        sync: false
      # App settings
      - key: LOG_LEVEL
        value: INFO
      - key: TOOLS_CONFIG
        value: config/tools.yaml
