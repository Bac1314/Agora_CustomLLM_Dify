services:
  - type: web
    name: agora-custom-llm
    runtime: docker
    healthCheckPath: /health
    envVars:
      # Upstream LLM
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false          # set in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Dify tool keys
      - key: DIFY_WEATHER_API_KEY
        sync: false
      # App settings
      - key: LOG_LEVEL
        value: INFO
      - key: TOOLS_CONFIG
        value: config/tools.yaml
