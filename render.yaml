services:
  - type: web
    name: agora-custom-llm
    runtime: docker
    healthCheckPath: /health
    envVars:
      # Upstream LLM
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # Auth — set this as llm.api_key in Agora ConvoAI
      - key: WRAPPER_API_KEY
        generateValue: true
      # Dify tool keys (add one per tool in tools.yaml)
      - key: DIFY_WEATHER_API_KEY
        sync: false
      - key: DIFY_WEB_SEARCH_API_KEY
        sync: false
      # App settings
      - key: LOG_LEVEL
        value: INFO
      - key: TOOLS_CONFIG
        value: config/tools.yaml
